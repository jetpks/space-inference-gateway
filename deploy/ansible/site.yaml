---
# Deploy space-inference-gateway on studio.slush.systems (macOS, user-level,
# no become). Apply via the wrapper, which uses ansible-pull so the playbook
# runs from a fresh clone (not the ~/src/space-inference-gateway checkout it
# is itself updating — avoids the self-modifying-playbook problem):
#
#   ssh eric@studio.slush.systems 'bash -s' < deploy/run.sh
#
# or locally after a clone:
#   ./deploy/run.sh
#
# The wrapper bootstraps ~/.venv-ansible (controller interpreter with
# packaging/virtualenv, since Homebrew pythons are PEP-668 managed) and
# pins ansible_python_interpreter to it.
- name: deploy space-inference-gateway on studio
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - space-inference-gateway
