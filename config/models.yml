# Model registry — alias → mlx_lm.server launch args.
# `model_dir` and `venv` may start with `~` (expanded to HOME by the registry).
default: qwen3-122b-a10b

models:
  qwen3-122b-a10b:
    engine: mlx
    model_dir: ~/models/Qwen3.5-122B-A10B-4bit
    port: 8080
    venv: ~/.venv-vllm-metal/bin/python
    decode_concurrency: 32
    prompt_concurrency: 8
  qwen3-35b-a3b:
    engine: mlx
    model_dir: ~/models/Qwen3.5-35B-A3B-4bit
    port: 8080
    venv: ~/.venv-vllm-metal/bin/python
    decode_concurrency: 32
    prompt_concurrency: 8
