# Model registry — alias → mlx_lm.server launch args.
# `model` is the HF repo id (or a local path) mlx_lm.server loads via --model;
# it is also the value the proxy rewrites the request "model" field to, since
# mlx validates that field against its loaded model id. `venv` may start with
# `~` (expanded to HOME by the registry).
default: hermes-4-70b

models:
  # Dense 70B (Llama-3.3 base, Nous instruct finetune). No native reasoning —
  # the chat template emits content only, so supports_reasoning: false keeps
  # the normalizer in passthrough (no <think>/reasoning-field extraction).
  hermes-4-70b:
    engine: mlx
    model: mlx-community/Hermes-4-70B-6bit
    port: 8080
    venv: ~/.venv-vllm-metal/bin/python
    decode_concurrency: 8
    prompt_concurrency: 4
    supports_reasoning: false
    # mlx_lm 0.31.3 bug: the eos_token_id-based stop (via
    # tokenizer.eos_token_ids in the SequenceStateMachine) does not fire for
    # this model — the server generates past <|eot_id|> (128009) without
    # stopping. Injecting it as an explicit stop sequence works around the
    # bug (string-based stop detection is unaffected).
    stop_tokens:
      - <|eot_id|>
  qwen3-122b-a10b:
    engine: mlx
    model: mlx-community/Qwen3.5-122B-A10B-4bit
    port: 8080
    venv: ~/.venv-vllm-metal/bin/python
    decode_concurrency: 32
    prompt_concurrency: 8
  qwen3-35b-a3b:
    engine: mlx
    model: mlx-community/Qwen3.5-35B-A3B-4bit
    port: 8080
    venv: ~/.venv-vllm-metal/bin/python
    decode_concurrency: 32
    prompt_concurrency: 8
