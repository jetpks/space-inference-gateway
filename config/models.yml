# Model registry — alias → concrete gguf + llama-server launch args.
# This is a sample; point `gguf` and `binary` at real paths on your host.
default: qwen3-35b-a3b

models:
  qwen3-35b-a3b:
    gguf: /path/to/models/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf
    port: 8080
    ctx: 524288
    parallel: 2
    offload: fit
    binary: /path/to/llama.cpp/llama-server
